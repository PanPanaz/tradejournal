      .insert({ user_id: getCurrentUser().id, name, initial_capital: parseFloat(initialCapital) || 0, currency })
      .select().single();
    const mapped = { id: newAcc.id, name: newAcc.name, initialCapital: newAcc.initial_capital, currency: newAcc.currency, trades: [] };
    setAccounts(prev => [...prev, mapped]);
    return mapped;
  };

  const updateAccount = async (accId, changes) => {
    await supabase.from('accounts').update({
      name: changes.name,
      initial_capital: parseFloat(changes.initialCapital) || 0,
      currency: changes.currency,
    }).eq('id', accId);
    setAccounts(prev => prev.map(a => a.id === accId ? { ...a, ...changes } : a));
  };

  const deleteAccount = async (accId) => {
    await supabase.from('accounts').delete().eq('id', accId);
    setAccounts(prev => {
      const remaining = prev.filter(a => a.id !== accId);
      if (activeAccountId === accId && remaining.length > 0) setActiveAccountId(remaining[0].id);
      return remaining;
    });
  };

  // --- TRADE OPERATIONS ---
  const setTrades = async (updater) => {
    const user = getCurrentUser();
    const currentTrades = accounts.find(a => a.id === activeAccountId)?.trades || [];
    const newTrades = typeof updater === 'function' ? updater(currentTrades) : updater;

    // Find added, updated, removed trades
    const currentIds = new Set(currentTrades.map(t => t.id));
    const newIds = new Set(newTrades.map(t => t.id));

    // Deleted
    for (const id of currentIds) {
      if (!newIds.has(id)) {
        await supabase.from('trades').delete().eq('id', id);
      }
    }

    // Added or updated
    for (const t of newTrades) {
      const dbRow = {
        id: typeof t.id === 'number' ? undefined : t.id,
        account_id: activeAccountId,
        user_id: user.id,
        instrument: t.instrument,
        asset: t.asset,
        direction: t.direction,
        qty: t.qty,
        entry: t.entry,
        exit: t.exit,
        entry_date: t.entryDate,
        exit_date: t.exitDate,
        pnl: t.pnl,
        fees: t.fees,
        strategy: t.strategy,
        rating: t.rating,
        notes: t.notes,
        psychology: t.psychology,
        manual_pnl: t.manualPnl,
        pip_value: t.pipValue,
        point_value: t.pointValue,
        premium: t.premium,
        images: t.images || [],
      };

      if (!currentIds.has(t.id)) {
        // New trade
        const { data: inserted } = await supabase.from('trades').insert(dbRow).select().single();
        if (inserted) {
          setAccounts(prev => prev.map(a => a.id === activeAccountId
            ? { ...a, trades: a.trades.map(tr => tr.id === t.id ? { ...t, id: inserted.id } : tr) }
            : a
          ));
          return;
        }
      } else {
        // Updated trade
        await supabase.from('trades').update(dbRow).eq('id', t.id);
      }
    }

    setAccounts(prev => prev.map(a => a.id === activeAccountId ? { ...a, trades: newTrades } : a));
  };

  // --- STRATEGY OPERATIONS ---
  const handleSetSavedStrategies = async (updater) => {
    const user = getCurrentUser();
    const newStrats = typeof updater === 'function' ? updater(savedStrategies) : updater;

    // Delete all and re-insert (simpler approach)
    await supabase.from('strategies').delete().eq('user_id', user.id);
    if (newStrats.length > 0) {
      await supabase.from('strategies').insert(newStrats.map(name => ({ user_id: user.id, name })));
    }
    setSavedStrategies(newStrats);
  };

  if (dbLoading) {
    return (
      <div style={{minHeight:'100vh', background:'var(--bg)', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:16}}>
        <div style={{width:48, height:48, background:'var(--blue)', borderRadius:14, display:'flex', alignItems:'center', justifyContent:'center'}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
        </div>
        <div style={{color:'var(--muted)', fontSize:14}}>Chargement de vos données...</div>
        <div style={{color:'#6B7280', fontSize:11, fontFamily:'monospace', background:'#1A1D27', padding:'6px 12px', borderRadius:8}}>{debugStatus}</div>
      </div>
    );
  }

  const activeAccount = accounts.find(a => a.id === activeAccountId) || accounts[0] || { id: null, name: '', initialCapital: 10000, currency: 'EUR', trades: [] };
  const trades = activeAccount.trades || [];
  const settings = { accountName: activeAccount.name, initialCapital: activeAccount.initialCapital, currency: activeAccount.currency };

  const navItems = [
    { id: 'dashboard', label: 'Dashboard', svg: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg> },
    { id: 'trades', label: 'Mes Trades', svg: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> },
    { id: 'nouveau', label: 'Nouveau', svg: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> },
    { id: 'analyses', label: 'Analyses', svg: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> },
    { id: 'parametres', label: 'Paramètres', svg: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> },
  ];

  const pageTitles = { dashboard: 'Dashboard', trades: 'Mes Trades', nouveau: editTrade ? 'Modifier Trade' : 'Nouveau Trade', analyses: 'Analyses', parametres: 'Paramètres' };

  const [isDesktop, setIsDesktop] = useState(() => window.innerWidth >= 768);

  useEffect(() => {
    const handler = () => setIsDesktop(window.innerWidth >= 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  const pageContent = (
    <>
      {page === 'dashboard' && <Dashboard trades={trades} settings={settings} setPage={setPage} />}
      {page === 'trades' && <MesTrades trades={trades} setTrades={setTrades} setPage={setPage} setEditTrade={setEditTrade} />}
      {page === 'nouveau' && <NouveauTrade trades={trades} setTrades={setTrades} setPage={setPage} editTrade={editTrade} savedStrategies={savedStrategies} setSavedStrategies={handleSetSavedStrategies} />}
      {page === 'analyses' && <Analyses trades={trades} theme={theme} />}
      {page === 'parametres' && <Parametres accounts={accounts} setAccounts={setAccounts} activeAccountId={activeAccountId} setActiveAccountId={setActiveAccountId} theme={theme} setTheme={setTheme} savedStrategies={savedStrategies} setSavedStrategies={handleSetSavedStrategies} onLogout={onLogout} addAccount={addAccount} updateAccount={updateAccount} deleteAccount={deleteAccount} />}
    </>
  );

  if (isDesktop) {
    return (
      <div className="app">
        {/* Desktop sidebar */}
        <aside className="desktop-sidebar">
          <div className="sidebar-brand">
            <div className="sidebar-brand-icon">↗</div>
            <div>
              <div className="sidebar-brand-text">TradeJournal</div>
              <div className="sidebar-brand-sub">PRO</div>
            </div>
          </div>
          {navItems.map(n => {
            const isActive = page === n.id;
            return (
              <button key={n.id} className={`sidebar-nav-item ${isActive ? 'active' : ''}`}
                onClick={() => { if(n.id === 'nouveau') setEditTrade(null); setPage(n.id); }}>
                <span className="sidebar-nav-icon" style={{color: isActive ? 'white' : 'var(--muted)'}}>
                  {n.svg}
                </span>
                {n.label}
              </button>
            );
          })}
          {/* Account pill at bottom */}
          <div style={{marginTop:'auto', paddingTop:16}}>
            <button onClick={() => setPage('parametres')} className="sidebar-account-pill" style={{display:'flex',alignItems:'center',gap:8,width:'100%',border:'none',cursor:'pointer',background:'var(--bg)',borderRadius:12,padding:'10px 12px',borderWidth:1,borderStyle:'solid',borderColor:'var(--border)'}}>
              <div className="sidebar-account-dot" />
              <div style={{flex:1,textAlign:'left',overflow:'hidden'}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeAccount.name}</div>
                <div style={{fontSize:10,color:'var(--muted)'}}>Compte actif</div>
              </div>
              <span style={{fontSize:10,color:'var(--muted)'}}>⚙</span>
            </button>
          </div>
        </aside>

        {/* Main area */}
        <div className="desktop-main">
          {/* Top bar */}
          <div className="desktop-topbar">
            <div style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:22, color:'var(--text)'}}>{pageTitles[page]}</div>
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:12, color:'var(--muted)'}}>{activeAccount.trades.length} trades</span>
              <div style={{width:1, height:16, background:'var(--border)'}} />
              <span style={{fontSize:12, fontWeight:600, color: (activeAccount.trades.reduce((s,t)=>s+t.pnl,0)) >= 0 ? 'var(--green)' : 'var(--red)'}}>
                {activeAccount.trades.length ? (activeAccount.trades.reduce((s,t)=>s+t.pnl,0) >= 0 ? '+' : '') + activeAccount.trades.reduce((s,t)=>s+t.pnl,0).toFixed(2) + ' €' : '0,00 €'}
              </span>
            </div>
          </div>
          {/* Scrollable content */}
          <div className="desktop-scroll">
            {pageContent}
          </div>
        </div>
      </div>
    );
  }

  // Mobile layout
  return (
    <div className="app">
      <div style={{padding:'14px 20px 10px', background:'var(--bg)', position:'sticky', top:0, zIndex:100, borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Syne', sans-serif", fontWeight:800, fontSize:22, color:'var(--text)'}}>{pageTitles[page]}</div>
          <button onClick={() => setPage('parametres')} style={{display:'flex',alignItems:'center',gap:6,background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:20,padding:'5px 12px',cursor:'pointer',boxShadow:'var(--shadow)'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:'var(--green)',flexShrink:0}}></div>
            <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,color:'var(--text)',maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{activeAccount.name}</span>
            <span style={{fontSize:10,color:'var(--muted)'}}>▾</span>
          </button>
        </div>
      </div>
      {pageContent}
      <nav className="bottom-nav">
        {navItems.map(n => {
          const isActive = page === n.id;
          return (
            <button key={n.id} className={`bottom-nav-item ${isActive ? 'active' : ''}`} onClick={() => { if(n.id === 'nouveau') { setEditTrade(null); } setPage(n.id); }}>
              <span style={{display:'flex', alignItems:'center', justifyContent:'center', width:24, height:24, color: isActive ? 'var(--blue)' : 'var(--muted)', transition:'color 0.2s'}}>
                {n.svg}
              </span>
              <span className="nav-label" style={{color: isActive ? 'var(--blue)' : 'var(--muted)'}}>{n.label}</span>
            </button>
          );
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate />);
</script>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
      .catch(err => console.warn('[PWA] SW registration failed:', err));
  });
}

// Sync theme-color meta tag with app theme
const observer = new MutationObserver(() => {
  const isDark = document.body.classList.contains('dark');
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.content = isDark ? '#0F1117' : '#2563EB';
});
observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
</script>
</body>
</html>
